name: CI and Deploy Subs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nerior-subs-production
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR=/opt/nerior/subs
            REPO_URL=https://github.com/Stepa-Karpik/subs.git
            mkdir -p /opt/nerior
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            set_env() {
              key="$1"
              value="$2"
              python3 - "$key" "$value" <<'PY'
from pathlib import Path
import sys
key, value = sys.argv[1], sys.argv[2]
path = Path(".env")
lines = path.read_text().splitlines() if path.exists() else []
out = []
written = False
for line in lines:
    if line.startswith(key + "="):
        out.append(f"{key}={value}")
        written = True
    else:
        out.append(line)
if not written:
    out.append(f"{key}={value}")
path.write_text("\n".join(out) + "\n")
PY
            }
            planner_key="$(grep -E '^PLANNER_INTERNAL_API_KEY=' /opt/smart_planner/.env 2>/dev/null | cut -d= -f2- || true)"
            [ -n "$planner_key" ] && set_env PLANNER_INTERNAL_API_KEY "$planner_key"
            grep -q '^SUBS_INTERNAL_API_KEY=change-me$' .env && set_env SUBS_INTERNAL_API_KEY "$(openssl rand -hex 32)"
            grep -q '^ACCOUNT_IDENTIFIER_ENCRYPTION_KEY=change-this-secret$' .env && set_env ACCOUNT_IDENTIFIER_ENCRYPTION_KEY "$(openssl rand -hex 32)"
            grep -q '^ACCOUNT_IDENTIFIER_HASH_PEPPER=change-this-pepper$' .env && set_env ACCOUNT_IDENTIFIER_HASH_PEPPER "$(openssl rand -hex 32)"
            set_env ALLOW_DEV_AUTH false
            set_env NEXT_PUBLIC_API_URL https://subs.nerior.ru/api/v1
            set_env NEXT_PUBLIC_AUTH_LOGIN_URL https://auth.nerior.ru/login
            set_env NEXT_PUBLIC_ADMIN_URL https://admin.nerior.ru
            docker network inspect ecosystem >/dev/null 2>&1 || docker network create ecosystem
            docker compose --project-name nerior_subs up -d --build --remove-orphans
            docker image prune -f
