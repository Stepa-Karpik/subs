name: CI and Deploy Subs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nerior-subs-production
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR=/opt/nerior/subs
            REPO_URL=https://github.com/Stepa-Karpik/subs.git
            mkdir -p /opt/nerior
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            docker network inspect ecosystem >/dev/null 2>&1 || docker network create ecosystem
            docker compose --project-name nerior_subs up -d --build --remove-orphans
            docker image prune -f
