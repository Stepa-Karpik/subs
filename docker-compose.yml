name: nerior_subs

services:
  subs-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nerior_subs}
      POSTGRES_USER: ${POSTGRES_USER:-nerior}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nerior_subs_password}
    volumes:
      - subs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  subs-api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://nerior:nerior_subs_password@subs-postgres:5432/nerior_subs}
      IDENTITY_INTERNAL_URL: ${IDENTITY_INTERNAL_URL:-http://identity:8300/api/v1}
      PLANNER_INTERNAL_URL: ${PLANNER_INTERNAL_URL:-http://planner-api:8000/api/v1}
      DOCUMENTS_INTERNAL_URL: ${DOCUMENTS_INTERNAL_URL:-http://documents:8200/api/v1}
      AI_RUNTIME_INTERNAL_URL: ${AI_RUNTIME_INTERNAL_URL:-http://ai-runtime:8330/api/v1}
      AUTH_LOGIN_URL: ${AUTH_LOGIN_URL:-https://auth.nerior.ru/login}
      ALLOW_DEV_AUTH: ${ALLOW_DEV_AUTH:-false}
    depends_on:
      subs-postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8360:8360"
    networks:
      - default
      - ecosystem
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8360/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  subs-frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://subs.nerior.ru/api/v1}
        NEXT_PUBLIC_AUTH_LOGIN_URL: ${NEXT_PUBLIC_AUTH_LOGIN_URL:-https://auth.nerior.ru/login}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-https://admin.nerior.ru}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://subs.nerior.ru/api/v1}
      NEXT_PUBLIC_AUTH_LOGIN_URL: ${NEXT_PUBLIC_AUTH_LOGIN_URL:-https://auth.nerior.ru/login}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-https://admin.nerior.ru}
    depends_on:
      subs-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3400:3000"

volumes:
  subs_postgres_data:

networks:
  ecosystem:
    external: true
